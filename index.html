<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 3 Blockchain Interactive Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .option-btn { transition: all 0.2s; }
        .option-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4">
        <!-- Start Screen -->
        <div id="start-screen" class="flex-1 flex flex-col justify-center items-center text-center">
            <div class="w-24 h-24 bg-blue-100 rounded-3xl flex items-center justify-center mb-6 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Unit 3 Quiz</h1>
            <p class="text-slate-500 mb-8 font-medium italic">Blockchain Technology (50 MCQs)</p>
            <button onclick="startQuiz()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition-all">
                Start Solving Now
            </button>
            <p class="mt-6 text-xs text-slate-400 uppercase tracking-widest font-bold">MSBTE Emerging Trends</p>
        </div>

        <!-- Quiz Screen (Hidden Initially) -->
        <div id="quiz-screen" class="hidden flex-1 flex flex-col">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span id="progress-text" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Question 1/50</span>
                    <span id="score-text" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">Score: 0</span>
                </div>
                <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-300" style="width: 2%"></div>
                </div>
            </div>

            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-6 leading-snug">Loading Question...</h2>

            <div id="options-container" class="space-y-3 mb-6">
                <!-- Options will be injected here -->
            </div>

            <div id="explanation-box" class="hidden mb-6 p-4 bg-slate-900 rounded-2xl text-slate-300 text-sm italic border-l-4 border-blue-500 animate-in fade-in">
                <!-- Explanation injected here -->
            </div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg shadow-md mt-auto">
                Next Question
            </button>
        </div>

        <!-- Result Screen (Hidden Initially) -->
        <div id="result-screen" class="hidden flex-1 flex flex-col justify-center items-center text-center">
            <div class="w-24 h-24 bg-yellow-50 rounded-full flex items-center justify-center mb-6 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" />
                </svg>
            </div>
            <h2 class="text-3xl font-black text-slate-800 mb-1">Great Job!</h2>
            <p class="text-slate-500 mb-8 font-medium">Blockchain Proficiency Result</p>
            
            <div class="bg-white p-8 rounded-3xl border border-slate-200 w-full mb-8 shadow-sm">
                <p id="final-score" class="text-6xl font-black text-blue-600 mb-2">0</p>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Correct out of 50</p>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Retry Mock Exam
            </button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What is the primary definition of Blockchain?", options: ["A centralized cloud database", "A decentralized, distributed digital ledger", "A high-speed internet protocol", "A type of firewall software"], a: 1, e: "Blockchain is defined as a decentralized ledger that records transactions securely without a central authority." },
            { q: "Which feature ensures that data on a blockchain cannot be modified?", options: ["Transparency", "Scalability", "Immutability", "Anonymity"], a: 2, e: "Immutability is the core security feature that makes records permanent." },
            { q: "Instead of a single server, data is stored on multiple computers called:", options: ["Nodes", "Terminals", "Clusters", "Mainframes"], a: 0, e: "Nodes are the participants in the network that each maintain a copy of the ledger." },
            { q: "Which feature creates a public, auditable trail for every transaction?", options: ["Privacy", "Transparency", "Efficiency", "Centralization"], a: 1, e: "Transparency allows anyone (or authorized users) to audit the sequence of events." },
            { q: "What is a 'Smart Contract'?", options: ["A PDF legal document", "Self-executing code that automates agreements", "A digital signature only", "An AI-powered lawyer"], a: 1, e: "Smart contracts are programs that run automatically when conditions are met." },
            { q: "In traditional banking, the system architecture is usually:", options: ["Decentralized", "Peer-to-Peer", "Centralized", "Distributed"], a: 2, e: "Traditional banking relies on a central authority or database." },
            { q: "What links one block to the previous one in the chain?", options: ["User password", "Previous Block Hash", "Block Number only", "Physical cable"], a: 1, e: "The hash of the previous block is stored in the current block, creating the secure chain." },
            { q: "Which consensus mechanism is used by Bitcoin?", options: ["Proof of Stake", "Proof of Work", "Proof of Authority", "PBFT"], a: 1, e: "Bitcoin uses Proof of Work (PoW) which involves miners solving puzzles." },
            { q: "A 'Permissionless' blockchain is also known as a:", options: ["Private Blockchain", "Public Blockchain", "Consortium Blockchain", "Hybrid Blockchain"], a: 1, e: "Public blockchains are permissionless because anyone can join and participate." },
            { q: "Which layer of blockchain defines the physical storage of data?", options: ["Consensus Layer", "Data Layer", "Application Layer", "Network Layer"], a: 1, e: "The Data Layer manages how data is structured into blocks and hashed." },
            { q: "Which type of blockchain is controlled by a single company?", options: ["Public", "Consortium", "Private", "Global"], a: 2, e: "Private blockchains are restricted and controlled by one entity for internal use." },
            { q: "Which blockchain type is managed by multiple pre-selected organizations?", options: ["Public", "Private", "Consortium", "Hybrid"], a: 2, e: "Consortium blockchains (e.g. R3 Corda) are semi-decentralized." },
            { q: "The 'Application Layer' provides which interface to the user?", options: ["DApps and APIs", "The raw kernel code", "P2P protocol rules", "Mining hardware drivers"], a: 0, e: "Users interact with blockchain through DApps (Decentralized Applications) in the top layer." },
            { q: "Which cryptocurrency popularized the use of programmable Smart Contracts?", options: ["Bitcoin", "Litecoin", "Ethereum", "Dogecoin"], a: 2, e: "Ethereum was built specifically to support a programmable logic layer." },
            { q: "What is the 'Double Spending' problem?", options: ["Spending too much money", "Spending the same digital coin twice", "Using two wallets", "Buying twice as much crypto"], a: 1, e: "Blockchain consensus prevents the same asset from being transferred to two people simultaneously." },
            { q: "What is the very first block in a blockchain called?", options: ["Primary Block", "Origin Block", "Genesis Block", "Standard Block"], a: 2, e: "The Genesis Block is the hard-coded first block of any chain." },
            { q: "Which consensus mechanism uses 'Stakers' instead of 'Miners'?", options: ["Proof of Work", "Proof of Stake", "Proof of Identity", "Proof of History"], a: 1, e: "Proof of Stake (PoS) allows validators to secure the network based on the coins they hold." },
            { q: "What is 'Finality' in blockchain?", options: ["The end of the network", "The moment a transaction is irreversible", "The size of a block", "The number of users"], a: 1, e: "Finality ensures that once a block is added, it will never be reversed or changed." },
            { q: "Which industry uses blockchain for 'Provenance' (origin tracking)?", options: ["Gaming", "Supply Chain", "Social Media", "Weather Forecasting"], a: 1, e: "Supply chains use blockchain to verify the origin and journey of products." },
            { q: "What is 'Gas' in the context of Ethereum?", options: ["Physical fuel", "The unit measuring computational effort for fees", "A type of NFT", "Internet speed meter"], a: 1, e: "Gas fees are paid to miners/validators to process transactions on the network." },
            { q: "A 'Hard Fork' results in:", options: ["Network speed doubling", "The blockchain splitting into two separate paths", "Data being deleted", "Mining hardware failing"], a: 1, e: "Forks happen when the community changes the rules, splitting the chain (e.g. BTC and BCH)." },
            { q: "Which challenge refers to low transaction processing speeds?", options: ["Interoperability", "Privacy", "Scalability", "Complexity"], a: 2, e: "Scalability is a major challenge for networks like Bitcoin which handle only 7 TPS." },
            { q: "The conflict between privacy laws and blockchain is usually about:", options: ["The Right to be Forgotten vs Immutability", "Encryption speed", "Anonymity", "Energy use"], a: 0, e: "If data cannot be deleted (Immutability), it violates laws that require data deletion." },
            { q: "What is a 'Cold Wallet'?", options: ["A wallet with zero balance", "Offline storage for private keys (highly secure)", "A mobile app", "A bank account"], a: 1, e: "Cold wallets (hardware) are not connected to the internet, protecting them from hackers." },
            { q: "Which consensus is most energy-efficient?", options: ["Proof of Work", "Proof of Stake", "Mining", "Flooding"], a: 1, e: "PoS eliminates the need for massive computing power, making it green." },
            { q: "Which platform is an enterprise-grade private blockchain framework?", options: ["Dogecoin", "Hyperledger Fabric", "Solana", "Shiba Inu"], a: 1, e: "Hyperledger Fabric is designed specifically for business-to-business networks." },
            { q: "What represents ownership of unique digital items like art?", options: ["Fungible tokens", "NFTs (Non-Fungible Tokens)", "Stablecoins", "Private keys"], a: 1, e: "NFTs are unique tokens that prove ownership of specific digital assets." },
            { q: "In the 'Data Layer', what is a 'Merkle Tree' used for?", options: ["Decorating the UI", "Efficient verification of transactions in a block", "Connecting to the wifi", "Mining new coins"], a: 1, e: "Merkle Trees allow nodes to verify if a transaction belongs to a block without downloading the whole block." },
            { q: "Which layer handles P2P discovery of other nodes?", options: ["Application Layer", "Network Layer", "Contract Layer", "Physical Layer"], a: 1, e: "The Network Layer manages how nodes find and talk to each other." },
            { q: "What is the risk of a '51% Attack'?", options: ["Losing 51% of your battery", "An attacker gaining majority control to manipulate the ledger", "The price dropping 51%", "The network getting 51% faster"], a: 1, e: "If an entity controls most mining power, they can potentially reverse transactions." },
            { q: "Which industry uses blockchain to verify academic degrees?", options: ["Gaming", "Digital Identity and Education", "Agriculture", "Entertainment"], a: 1, e: "Blockchain can store credentials to prevent diploma fraud." },
            { q: "A 'Stablecoin' like USDT is pegged to:", options: ["Bitcoin price", "Fiat currency (like USD)", "Gold price only", "Total number of users"], a: 1, e: "Stablecoins maintain a $1 value by being backed by real-world assets." },
            { q: "Which programming language is mainly used for Ethereum contracts?", options: ["Python", "JavaScript", "Solidity", "Java"], a: 2, e: "Solidity is the object-oriented language for writing smart contracts." },
            { q: "What is 'DeFi'?", options: ["Deferred Filing", "Decentralized Finance", "Digital Files", "Default Finance"], a: 1, e: "DeFi removes banks from lending, borrowing, and trading using code." },
            { q: "The waiting area for unconfirmed transactions is called:", options: ["Mempool", "Mining rig", "Hard drive", "Kernel"], a: 0, e: "Transactions wait in the Memory Pool (Mempool) until they are picked for a block." },
            { q: "Which layer contains the actual mining hardware?", options: ["Consensus Layer", "Infrastructure Layer", "Data Layer", "Application Layer"], a: 1, e: "Infrastructure consists of the physical servers and miners." },
            { q: "What is 'Self-Sovereign Identity'?", options: ["Identity given by the king", "Users owning and controlling their own digital ID", "Social media profiles", "Credit cards"], a: 1, e: "SSI gives users total control over their personal data via blockchain." },
            { q: "Which consensus is used by Ethereum 2.0 (The Merge)?", options: ["Proof of Work", "Proof of Stake", "Proof of Burn", "Proof of Elapsed Time"], a: 1, e: "Ethereum moved to PoS to reduce energy consumption by 99%." },
            { q: "In healthcare, blockchain prevents drug:", options: ["Expirations", "Counterfeiting", "Overdosing", "Shortages"], a: 1, e: "Blockchain provides a secure history to verify if a drug is authentic." },
            { q: "R3 Corda is primarily built for:", options: ["Social gaming", "Financial institutions", "Personal blogs", "Public voting"], a: 1, e: "Corda is a consortium DLT designed for complex business and finance." },
            { q: "What is the 'Contract Layer' responsible for?", options: ["Connecting to the internet", "Executing scripts and business logic", "Mining coins", "Updating user passwords"], a: 1, e: "This layer houses the smart contracts and programmable rules." },
            { q: "Which challenge is about blockchains communicating with each other?", options: ["Scalability", "Interoperability", "Privacy", "Security"], a: 1, e: "Interoperability is the ability to transfer assets between different networks." },
            { q: "What does 'EVM' stand for?", options: ["Electronic Voting Machine", "Ethereum Virtual Machine", "Every Value Matters", "Electronic Valve Map"], a: 1, e: "The EVM is the virtual engine that executes contract code on Ethereum." },
            { q: "What is a 'Rug Pull'?", options: ["A hardware failure", "A scam where developers steal investor funds", "A type of mining tool", "A consensus update"], a: 1, e: "Rug pulls are common in DeFi where liquidity is suddenly removed by developers." },
            { q: "Which of these is a benefit of blockchain for voting?", options: ["Making voting faster only", "Ensuring results are immutable and tamper-proof", "Reducing the number of candidates", "Allowing users to vote 10 times"], a: 1, e: "Blockchain makes voting transparent and impossible to manipulate." },
            { q: "What links the 'Control Layer' in NGN to blockchain?", options: ["Both handle social media", "Both handle the signaling and logic of the system", "Both use the same physical cables", "There is no link"], a: 1, e: "Control layers in both architectures manage the rules and decision making." },
            { q: "What happens if you lose your private key?", options: ["Reset it with an OTP", "Call the blockchain company", "Lose access to your assets forever", "The miner can recover it"], a: 2, e: "Decentralization means no one else has your key; losing it means losing everything." },
            { q: "What is 'Tokenization'?", options: ["Playing a game with tokens", "Digitizing a real-world asset (like real estate) into a token", "Deleting a block", "Translating a website"], a: 1, e: "Tokenization allows fractional ownership of expensive assets like property." },
            { q: "Which blockchain is semi-decentralized?", options: ["Public", "Private", "Consortium", "Standard"], a: 2, e: "Consortium blockchains are shared by a group, making them semi-decentralized." },
            { q: "Blockchain aims to replace trust in people with trust in:", options: ["Governments", "Code and Mathematics", "Banks", "Social Media"], a: 1, e: "The goal is 'Trustless' systems where cryptography guarantees the truth." }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/50`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 50) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-blue-200 hover:bg-blue-50 font-medium text-sm text-slate-700 transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                container.appendChild(btn);
            });

            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            answered = false;
        }

        function selectOption(idx, btn) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentIdx];
            const allBtns = document.querySelectorAll('.option-btn');
            
            if (idx === q.a) {
                score++;
                btn.classList.replace('border-slate-100', 'border-green-500');
                btn.classList.add('bg-green-50', 'text-green-700');
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                btn.classList.replace('border-slate-100', 'border-red-500');
                btn.classList.add('bg-red-50', 'text-red-700');
                // Highlight correct one
                allBtns[q.a].classList.replace('border-slate-100', 'border-green-500');
                allBtns[q.a].classList.add('bg-green-50', 'text-green-700');
            }

            // Show explanation
            const exp = document.getElementById('explanation-box');
            exp.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            exp.classList.remove('hidden');
            
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
